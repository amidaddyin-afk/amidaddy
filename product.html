<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product | Amidaddy Perfumes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cinzel:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  </head>
  <body data-page="product">
    <div class="offer-strip">
      <ion-icon name="sparkles" style="margin-right: 6px"></ion-icon> Buy 1 Get 1 Free on all perfumes! <b>Shop Now</b>
    </div>

    <header class="topbar">
      <div class="nav-wrap">
        <a href="index.html" class="brand-pill">
          <span class="brand-dot" aria-hidden="true"></span>
          <h1>AMIDADDY</h1>
        </a>
        <a class="cart-btn" href="cart.html">
          <ion-icon name="bag-handle-outline" style="font-size: 20px;"></ion-icon> 
          <span class="cart-count" id="cart-count">0</span>
        </a>
      </div>
    </header>

    <main class="product-detail-layout">
      <div class="product-gallery animate-slide-up">
        <img id="product-image" src="" alt="" />
      </div>

      <div class="product-info animate-slide-up delay-200">
        <div class="profile" id="product-profile">Premium Fragrance</div>
        <h1 id="product-name">Loading...</h1>
        
        <p class="detail-desc" id="product-description">
          Please wait while we load the exquisite details of this fragrance.
        </p>

        <div class="specs-grid">
          <div class="spec-item">
            <span class="spec-label">Longevity</span>
            <span class="spec-value" id="product-longevity">--</span>
          </div>
          <div class="spec-item">
            <span class="spec-label">Best For</span>
            <span class="spec-value" id="product-mood">--</span>
          </div>
          <div class="spec-item" style="grid-column: span 2;">
            <span class="spec-label">Key Notes</span>
            <span class="spec-value" id="product-notes">--</span>
          </div>
        </div>

        <div class="action-bar">
          <div id="size-options" class="size-selector">
            <!-- Rendered by JS -->
          </div>
          
          <div class="price-box">
            <span class="current-price" id="selected-price">INR --</span>
          </div>

          <button id="add-to-cart" class="btn-primary">
            Add to Cart
            <ion-icon name="arrow-forward-outline" style="vertical-align: middle; margin-left: 5px;"></ion-icon>
          </button>
        </div>
      </div>
    </main>
    
    <div id="toast-container"></div>
    <script src="script.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Cart | Amidaddy Perfumes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cinzel:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  </head>
  <body data-page="cart">
    <div class="offer-strip">
      <ion-icon name="sparkles" style="margin-right: 6px"></ion-icon> Buy 1 Get 1 Free on all perfumes! <b>Shop Now</b>
    </div>

    <header class="topbar">
      <div class="nav-wrap">
        <a href="index.html" class="brand-pill">
          <span class="brand-dot" aria-hidden="true"></span>
          <h1>AMIDADDY</h1>
        </a>
        <a class="cart-btn" href="cart.html">
          <ion-icon name="bag-handle-outline" style="font-size: 20px;"></ion-icon> 
          <span class="cart-count" id="cart-count">0</span>
        </a>
      </div>
    </header>

    <main class="cart-layout">
      <div class="cart-header animate-slide-up">
        <h2 style="font-family: 'Cinzel', serif; font-size: 36px; margin:0;">Shopping Cart</h2>
      </div>

      <div class="cart-items animate-slide-up delay-100" id="cart-items">
        <!-- Rendered by JS -->
      </div>

      <div class="cart-summary animate-slide-up delay-200" id="cart-summary" style="display: none;">
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="subtotal-display">INR 0</span>
        </div>
        <div class="summary-row" style="color: #ffdeaa;">
          <span>BOGO Discount</span>
          <span id="discount-display">- INR 0</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="total-display">INR 0</span>
        </div>
        <button class="checkout-btn">Secure Checkout</button>
      </div>
    </main>

    <div id="toast-container"></div>
    <script src="script.js"></script>
  </body>
</html>

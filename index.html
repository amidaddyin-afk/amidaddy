<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amidaddy Perfumes | Luxury Scents</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cinzel:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  </head>
  <body data-page="home">
    <div class="offer-strip">
      <ion-icon name="sparkles" style="margin-right: 6px"></ion-icon> Buy 1 Get 1 Free on all perfumes! <b>Shop Now</b>
    </div>

    <header class="topbar">
      <div class="nav-wrap">
        <a href="index.html" class="brand-pill">
          <span class="brand-dot" aria-hidden="true"></span>
          <h1>AMIDADDY</h1>
        </a>
        <a class="cart-btn" href="cart.html">
          <ion-icon name="bag-handle-outline" style="font-size: 20px;"></ion-icon> 
          <span class="cart-count animate-fade-in" id="cart-count">0</span>
        </a>
      </div>
    </header>

    <section class="banner animate-fade-in delay-200">
      <div id="slides" class="slides"></div>
      <div id="dots" class="dots"></div>
    </section>

    <!-- All Perfumes Section (Editorial Grid) -->
    <main class="store">
      <div class="section-head animate-slide-up">
        <h3>The Collection</h3>
        <p>Luxury scents crafted for bold personalities and everyday confidence.</p>
      </div>
      <section id="products" class="product-grid animate-slide-up delay-200"></section>
    </main>

    <!-- Combos Section -->
    <main class="store">
      <div class="section-head animate-slide-up">
        <h3>Exclusive Offers</h3>
        <p>Curated combos and special pricing for the ultimate fragrance experience.</p>
      </div>
      <section id="combos" class="product-grid animate-slide-up delay-200"></section>
    </main>

    <div id="toast-container"></div>

    <script src="script.js"></script>
  </body>
</html>
